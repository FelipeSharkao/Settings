{{ "# this file is generated by wallust, please do not edit it directly" }}

os:
    editPreset: nvim-remote

git:
    ignoreWhitespaceInDiffView: true
    autoForwardBranches: none
    pagers:
        - colorArg: always
          {% if palette[:5] == "light" or palette[:5] == "light16" %}
          pager: delta --light --paging=never --line-numbers --hyperlinks --hyperlinks-file-link-format="lazygit-edit://{path}:{line}"
          {% else %}
          pager: delta --dark --paging=never --line-numbers --hyperlinks --hyperlinks-file-link-format="lazygit-edit://{path}:{line}"
          {% endif %}

gui:
    language: en
